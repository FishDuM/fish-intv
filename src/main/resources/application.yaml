server:
  port: 8912

spring:
  application:
    name: fish-intv
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432}/fish_intv
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB  # 支持知识库上传（简历限制在业务层检查）
      max-request-size: 50MB
  data:
    redis:
      # Redis数据库索引（默认为0）
      database: 0
      # Redis服务器地址
      host: localhost
      # Redis服务器连接端口
      port: 6379
      # Redis服务器连接密码（默认为空）
      # password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0


#  ai:
#    retry:
#      max-attempts: 1       # 关闭框架层重试
#      on-client-errors: false
#    openai:
#      base-url:
#      api-key:
#      chat:
#        options:
#          model:
#          temperature: 0.7
#    vectorstore:
#      pgvector:
